{% extends 'base.html' %}

{% block title %}Password Reset Complete - {{ site_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center space-y-8">
        <div>
            <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                <i class="fas fa-check-circle text-2xl text-green-600"></i>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Password changed
            </h2>
            <p class="mt-4 text-sm text-gray-600 leading-relaxed">
                Your password has been set. You may now log in to your account with your new password.
            </p>
        </div>
        
        <div class="pt-4">
            <a href="{% url 'accounts:login' %}" 
               class="inline-flex items-center px-8 py-3 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm">
                Login now
            </a>
        </div>
    </div>
</div>
{% endblock %}
