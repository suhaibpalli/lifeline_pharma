<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}{{ site_settings.meta_description|default:'Trusted online pharmacy for all your healthcare needs' }}{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}pharmacy, medicines, healthcare, online pharmacy{% endblock %}">
    
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Production Build) -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/tailwind.min.css' %}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    
    {% block extra_css %}{% endblock %}
    <style>
        :root {
            --color-primary: #0c7ff2;
            --color-primary-hover: #0968da;
            --color-surface: #ffffff;
            --color-surface-muted: #f8fafc;
            --color-content-primary: #0f172a;
            --color-content-secondary: #64748b;
            --color-border: #e2e8f0;
            --color-success: #059669;
            --color-warning: #d97706;
            --color-error: #dc2626;
            --color-info: #0284c7;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --shadow-soft: 0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04);
            --shadow-card: 0 0 0 1px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 10px 40px -10px rgba(0, 0, 0, 0.12);
            --transition-fast: 150ms ease;
            --transition-base: 250ms ease;
            --transition-slow: 400ms ease;
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        *:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        ::selection {
            background-color: rgba(12, 127, 242, 0.2);
            color: #0f172a;
        }
        
        /* Skip to main content link for accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--color-primary);
            color: white;
            padding: 8px 16px;
            z-index: 100;
            transition: top 0.3s;
        }
        
        .skip-link:focus {
            top: 0;
        }
    </style>
</head>
<body class="bg-surface-muted font-lexend text-content-primary antialiased">
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <div class="relative flex min-h-screen flex-col">
        <!-- Header -->
        {% include 'partials/header.html' %}
        
        <!-- Messages -->
        {% if messages %}
            {% include 'partials/messages.html' %}
        {% endif %}
        
        <!-- Main Content -->
        <main id="main-content" class="flex-1">
            {% block content %}{% endblock %}
        </main>
        
        <!-- Footer -->
        {% include 'partials/footer.html' %}
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- JavaScript -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/cart.js' %}"></script>
    <script src="{% static 'js/wishlist.js' %}"></script>
    <script src="{% static 'js/carousel.js' %}"></script>
    {% block extra_js %}{% endblock %}

    <!-- Toast JavaScript -->
    <script>
    function showToast(message, type = 'info', duration = 5000) {
        const container = document.getElementById('toast-container');
        
        const toast = document.createElement('div');
        toast.className = `toast-notification transform transition-all duration-300 ease-out translate-x-full opacity-0`;
        
        const colors = {
            success: 'bg-success',
            error: 'bg-error',
            warning: 'bg-warning',
            info: 'bg-info'
        };
        
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-times-circle',
            warning: 'fa-exclamation-triangle',
            info: 'fa-info-circle'
        };
        
        toast.innerHTML = `
            <div class="${colors[type] || colors.info} text-white px-6 py-4 rounded-xl shadow-hover flex items-center gap-3 min-w-80 backdrop-blur-sm">
                <i class="fas ${icons[type] || icons.info} text-lg"></i>
                <span class="flex-1 font-medium">${message}</span>
                <button onclick="this.closest('.toast-notification').remove()" class="text-white/80 hover:text-white transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        `;
        
        container.appendChild(toast);
        
        // Animate in
        requestAnimationFrame(() => {
            toast.classList.remove('translate-x-full', 'opacity-0');
        });
        
        // Auto remove
        setTimeout(() => {
            toast.classList.add('translate-x-full', 'opacity-0');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 300);
        }, duration);
    }

    // Show Django messages as toasts
    {% if messages %}
        document.addEventListener('DOMContentLoaded', function() {
            {% for message in messages %}
                showToast('{{ message|escapejs }}', '{{ message.tags }}');
            {% endfor %}
        });
    {% endif %}
    
    // Intersection Observer for scroll animations
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    };
    
    const animateOnScroll = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('animate-fade-up');
                animateOnScroll.unobserve(entry.target);
            }
        });
    }, observerOptions);
    
    document.querySelectorAll('.scroll-animate').forEach(el => {
        animateOnScroll.observe(el);
    });
    </script>
</body>
</html>
